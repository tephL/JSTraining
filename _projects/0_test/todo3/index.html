<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to To Do List</h1>
    <p id="time"></p>

    <div id="inputDiv">
        <h3>type in ur task</h3>
        <input type="text" id="newTaskInput">
        <button id="inputBtn">submit</button>
    </div>

    <h2>tasks</h2>
    <div id="tasks">
        <div class="task">
            <p class="creationDate">Date: 10-10-1000</p>
            <p class="taskContent">bruh</p>
            <button class="donetask">done</button>
            <button class="undonetask">undone</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
